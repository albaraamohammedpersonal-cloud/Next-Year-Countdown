<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Year Countdown</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="hero">
      <div class="year-info"> 
          <span id="currentYear"></span>
          <span id="nextYear"></span>
        </div>
        <div id="stars"></div>
        <h1>Next Year Countdown</h1>
        <div class="timebox">
           <div class="time">
              <h2 id="Days">000</h2>
              <p>Days</p>
           </div>
           <div class="time">
              <h2 id="Hours">00</h2>
              <p>Hours</p>
           </div>
           <div class="time">
              <h2 id="Minutes">00</h2>
              <p>Minutes</p>
           </div>
           <div class="time">
              <h2 id="Seconds">00</h2>
              <p>Seconds</p>
           </div>
       </div>
    </div>
   <script src="script.js"></script>
</body>
</html>
